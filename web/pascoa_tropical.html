<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OlaBrazil — Pascoa Tropical</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #000;
    }

    .canvas {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg,
        #1a7a3c 0%,
        #2d9e52 10%,
        #4db86a 20%,
        #f5c518 35%,
        #f7a800 45%,
        #f47b20 60%,
        #e8512a 75%,
        #d43f6b 88%,
        #c0306a 100%
      );
    }

    /* ---- NOISE TEXTURE OVERLAY ---- */
    .canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
      opacity: 0.18;
      z-index: 1;
      pointer-events: none;
    }

    /* ---- SUN BURST ---- */
    .sunburst {
      position: absolute;
      top: -60px;
      right: -60px;
      width: 480px;
      height: 480px;
      z-index: 2;
      opacity: 0.22;
    }

    /* ---- BACKGROUND LEAVES (decorative) ---- */
    .leaves-bg {
      position: absolute;
      inset: 0;
      z-index: 3;
      opacity: 0.55;
    }

    /* ---- MAIN CONTENT LAYER ---- */
    .content {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 54px 64px 52px;
    }

    /* ---- TOP BRAND BAR ---- */
    .brand-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .logo-text {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.45);
      font-family: 'Georgia', serif;
      position: relative;
    }
    .logo-text span {
      color: #FFE033;
    }

    .tag-pill {
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.55);
      border-radius: 40px;
      padding: 8px 22px;
      color: #fff;
      font-size: 18px;
      letter-spacing: 2px;
      font-family: 'Georgia', serif;
      backdrop-filter: blur(4px);
    }

    /* ---- CENTER STAGE ---- */
    .center-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex: 1;
      justify-content: center;
      width: 100%;
    }

    /* ---- HEADLINE ---- */
    .headline-wrap {
      text-align: center;
      margin-bottom: 32px;
    }

    .headline-accent {
      font-size: 22px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #FFE033;
      font-family: 'Georgia', serif;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      margin-bottom: 8px;
    }

    .headline-main {
      font-size: 78px;
      font-weight: 900;
      line-height: 1.0;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 60px rgba(255,200,0,0.3);
      font-family: 'Georgia', serif;
      letter-spacing: -1px;
    }
    .headline-main .highlight {
      color: #FFE033;
      display: block;
    }

    /* ---- EGGS CLUSTER ---- */
    .eggs-cluster {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: -20px;
      margin: 0;
    }

    /* ---- BOTTOM COPY ---- */
    .bottom-copy {
      text-align: center;
      width: 100%;
    }

    .sub-copy {
      font-size: 32px;
      color: #fff;
      font-family: 'Georgia', serif;
      font-style: italic;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .sub-copy strong {
      color: #FFE033;
      font-style: normal;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .divider-line {
      width: 200px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #FFE033, transparent);
      margin: 0 auto 14px;
      border-radius: 2px;
    }

    .brand-tagline {
      font-size: 20px;
      color: rgba(255,255,255,0.75);
      letter-spacing: 4px;
      text-transform: uppercase;
      font-family: 'Georgia', serif;
    }
  </style>
</head>
<body>
<div class="canvas">

  <!-- ==============================
       SUNBURST SVG
  =============================== -->
  <svg class="sunburst" viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(240,240)">
      <!-- Rays -->
      <g fill="#FFE033">
        <polygon points="0,-240 14,-120 -14,-120" opacity="0.9"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(20)" opacity="0.7"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(40)" opacity="0.8"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(60)" opacity="0.7"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(80)" opacity="0.9"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(100)" opacity="0.7"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(120)" opacity="0.8"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(140)" opacity="0.7"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(160)" opacity="0.9"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(180)" opacity="0.7"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(200)" opacity="0.8"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(220)" opacity="0.7"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(240)" opacity="0.9"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(260)" opacity="0.7"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(280)" opacity="0.8"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(300)" opacity="0.7"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(320)" opacity="0.9"/>
        <polygon points="0,-240 14,-120 -14,-120" transform="rotate(340)" opacity="0.7"/>
      </g>
      <!-- Sun circle -->
      <circle r="90" fill="#FFE033" opacity="0.9"/>
      <circle r="72" fill="#F5A800" opacity="0.7"/>
      <circle r="52" fill="#FFE033" opacity="0.8"/>
    </g>
  </svg>

  <!-- ==============================
       BACKGROUND LEAVES SVG
  =============================== -->
  <svg class="leaves-bg" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="leaf1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1a7a3c"/>

      <linearGradient id="leaf2" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#2d9e52"/>
        <stop offset="100%" stop-color="#1a5e2a"/>
      </linearGradient>
      <linearGradient id="leaf3" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3ab668"/>
        <stop offset="100%" stop-color="#0e4a20"/>
      </linearGradient>
    </defs>

    <!-- Banana leaf — top left large -->
    <g transform="translate(-60,30) rotate(-20,200,200)" opacity="0.9">
      <ellipse cx="200" cy="160" rx="38" ry="190" fill="url(#leaf1)"/>
      <line x1="200" y1="-30" x2="200" y2="350" stroke="#1a5e2a" stroke-width="4"/>
      <!-- Veins -->
      <line x1="200" y1="60" x2="165" y2="90" stroke="#1a5e2a" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="100" x2="160" y2="135" stroke="#1a5e2a" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="140" x2="163" y2="178" stroke="#1a5e2a" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="180" x2="166" y2="218" stroke="#1a5e2a" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="220" x2="168" y2="255" stroke="#1a5e2a" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="60" x2="235" y2="90" stroke="#1a5e2a" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="100" x2="240" y2="135" stroke="#1a5e2a" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="140" x2="237" y2="178" stroke="#1a5e2a" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="180" x2="234" y2="218" stroke="#1a5e2a" stroke-width="1.5" opacity="0.6"/>
    </g>

    <!-- Banana leaf — top right -->
    <g transform="translate(860,-40) rotate(25,100,200)" opacity="0.85">
      <ellipse cx="100" cy="200" rx="32" ry="170" fill="url(#leaf2)"/>
      <line x1="100" y1="30" x2="100" y2="370" stroke="#0e4a20" stroke-width="3.5"/>
      <line x1="100" y1="80" x2="72" y2="110" stroke="#0e4a20" stroke-width="1.5" opacity="0.6"/>
      <line x1="100" y1="120" x2="70" y2="155" stroke="#0e4a20" stroke-width="1.5" opacity="0.6"/>
      <line x1="100" y1="160" x2="73" y2="196" stroke="#0e4a20" stroke-width="1.5" opacity="0.6"/>
      <line x1="100" y1="200" x2="74" y2="234" stroke="#0e4a20" stroke-width="1.5" opacity="0.6"/>
      <line x1="100" y1="80" x2="128" y2="110" stroke="#0e4a20" stroke-width="1.5" opacity="0.6"/>
      <line x1="100" y1="120" x2="130" y2="155" stroke="#0e4a20" stroke-width="1.5" opacity="0.6"/>
      <line x1="100" y1="160" x2="127" y2="196" stroke="#0e4a20" stroke-width="1.5" opacity="0.6"/>
    </g>

    <!-- Palm frond — bottom left -->
    <g transform="translate(-20,780) rotate(-35,80,80)" opacity="0.8">
      <ellipse cx="80" cy="60" rx="22" ry="130" fill="url(#leaf3)"/>
      <line x1="80" y1="-70" x2="80" y2="190" stroke="#0e4a20" stroke-width="3"/>
      <line x1="80" y1="20" x2="56" y2="48" stroke="#0e4a20" stroke-width="1.2" opacity="0.5"/>
      <line x1="80" y1="60" x2="54" y2="90" stroke="#0e4a20" stroke-width="1.2" opacity="0.5"/>
      <line x1="80" y1="100" x2="57" y2="128" stroke="#0e4a20" stroke-width="1.2" opacity="0.5"/>
      <line x1="80" y1="20" x2="104" y2="48" stroke="#0e4a20" stroke-width="1.2" opacity="0.5"/>
      <line x1="80" y1="60" x2="106" y2="90" stroke="#0e4a20" stroke-width="1.2" opacity="0.5"/>
      <line x1="80" y1="100" x2="103" y2="128" stroke="#0e4a20" stroke-width="1.2" opacity="0.5"/>
    </g>

    <!-- Palm frond — bottom right -->
    <g transform="translate(970,820) rotate(40,40,60)" opacity="0.75">
      <ellipse cx="40" cy="60" rx="20" ry="120" fill="url(#leaf1)"/>
      <line x1="40" y1="-60" x2="40" y2="180" stroke="#1a5e2a" stroke-width="2.8"/>
    </g>

    <!-- Small tropical leaf — middle left -->
    <g transform="translate(-30,480) rotate(10,60,60)" opacity="0.7">
      <ellipse cx="60" cy="60" rx="16" ry="90" fill="url(#leaf2)"/>
      <line x1="60" y1="-30" x2="60" y2="150" stroke="#0e4a20" stroke-width="2"/>
    </g>

    <!-- Small tropical leaf — middle right -->
    <g transform="translate(1020,380) rotate(-15,40,60)" opacity="0.65">
      <ellipse cx="40" cy="60" rx="14" ry="80" fill="url(#leaf3)"/>
      <line x1="40" y1="-20" x2="40" y2="140" stroke="#1a5e2a" stroke-width="2"/>
    </g>

    <!-- Hibisco flower — top left corner -->
    <g transform="translate(88,88)" opacity="0.9">
      <!-- 5 petals -->
      <ellipse cx="0" cy="-38" rx="16" ry="34" fill="#e8334a" opacity="0.9"/>
      <ellipse cx="0" cy="-38" rx="16" ry="34" fill="#e8334a" opacity="0.9" transform="rotate(72,0,0)"/>
      <ellipse cx="0" cy="-38" rx="16" ry="34" fill="#e8334a" opacity="0.9" transform="rotate(144,0,0)"/>
      <ellipse cx="0" cy="-38" rx="16" ry="34" fill="#e8334a" opacity="0.9" transform="rotate(216,0,0)"/>
      <ellipse cx="0" cy="-38" rx="16" ry="34" fill="#e8334a" opacity="0.9" transform="rotate(288,0,0)"/>
      <!-- Center -->
      <circle cx="0" cy="0" r="10" fill="#FFE033"/>
      <circle cx="0" cy="0" r="5" fill="#f47b20"/>
    </g>

    <!-- Hibisco flower — bottom right -->
    <g transform="translate(990,990)" opacity="0.85">
      <ellipse cx="0" cy="-36" rx="15" ry="32" fill="#d43f6b" opacity="0.9"/>
      <ellipse cx="0" cy="-36" rx="15" ry="32" fill="#d43f6b" opacity="0.9" transform="rotate(72,0,0)"/>
      <ellipse cx="0" cy="-36" rx="15" ry="32" fill="#d43f6b" opacity="0.9" transform="rotate(144,0,0)"/>
      <ellipse cx="0" cy="-36" rx="15" ry="32" fill="#d43f6b" opacity="0.9" transform="rotate(216,0,0)"/>
      <ellipse cx="0" cy="-36" rx="15" ry="32" fill="#d43f6b" opacity="0.9" transform="rotate(288,0,0)"/>
      <circle cx="0" cy="0" r="9" fill="#FFE033"/>
      <circle cx="0" cy="0" r="4.5" fill="#f47b20"/>
    </g>

    <!-- Small hibisco — top right area -->
    <g transform="translate(950,120)" opacity="0.8">
      <ellipse cx="0" cy="-28" rx="12" ry="25" fill="#e8512a" opacity="0.85"/>
      <ellipse cx="0" cy="-28" rx="12" ry="25" fill="#e8512a" opacity="0.85" transform="rotate(72,0,0)"/>
      <ellipse cx="0" cy="-28" rx="12" ry="25" fill="#e8512a" opacity="0.85" transform="rotate(144,0,0)"/>
      <ellipse cx="0" cy="-28" rx="12" ry="25" fill="#e8512a" opacity="0.85" transform="rotate(216,0,0)"/>
      <ellipse cx="0" cy="-28" rx="12" ry="25" fill="#e8512a" opacity="0.85" transform="rotate(288,0,0)"/>
      <circle cx="0" cy="0" r="7" fill="#FFE033"/>
      <circle cx="0" cy="0" r="3.5" fill="#f47b20"/>
    </g>

    <!-- Small hibisco — bottom left -->
    <g transform="translate(130,960)" opacity="0.8">
      <ellipse cx="0" cy="-26" rx="11" ry="24" fill="#c0306a" opacity="0.85"/>
      <ellipse cx="0" cy="-26" rx="11" ry="24" fill="#c0306a" opacity="0.85" transform="rotate(72,0,0)"/>
      <ellipse cx="0" cy="-26" rx="11" ry="24" fill="#c0306a" opacity="0.85" transform="rotate(144,0,0)"/>
      <ellipse cx="0" cy="-26" rx="11" ry="24" fill="#c0306a" opacity="0.85" transform="rotate(216,0,0)"/>
      <ellipse cx="0" cy="-26" rx="11" ry="24" fill="#c0306a" opacity="0.85" transform="rotate(288,0,0)"/>
      <circle cx="0" cy="0" r="6.5" fill="#FFE033"/>
      <circle cx="0" cy="0" r="3" fill="#f47b20"/>
    </g>

    <!-- Dots & sparkles -->
    <circle cx="320" cy="70" r="6" fill="#FFE033" opacity="0.7"/>
    <circle cx="760" cy="90" r="4" fill="#fff" opacity="0.5"/>
    <circle cx="180" cy="350" r="5" fill="#FFE033" opacity="0.6"/>
    <circle cx="900" cy="310" r="7" fill="#fff" opacity="0.4"/>
    <circle cx="60" cy="660" r="4" fill="#FFE033" opacity="0.6"/>
    <circle cx="1020" cy="600" r="5" fill="#fff" opacity="0.5"/>
    <circle cx="400" cy="980" r="6" fill="#FFE033" opacity="0.55"/>
    <circle cx="700" cy="1010" r="4" fill="#fff" opacity="0.5"/>
    <circle cx="540" cy="44" r="5" fill="#e8334a" opacity="0.7"/>
    <circle cx="1060" cy="460" r="5" fill="#FFE033" opacity="0.6"/>

    <!-- Star sparkle — top center -->
    <g transform="translate(540,55)" opacity="0.8">
      <line x1="0" y1="-12" x2="0" y2="12" stroke="#FFE033" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-12" y1="0" x2="12" y2="0" stroke="#FFE033" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-8" y1="-8" x2="8" y2="8" stroke="#FFE033" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="-8" x2="-8" y2="8" stroke="#FFE033" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Star sparkle — middle right -->
    <g transform="translate(1045,530)" opacity="0.7">
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- Star sparkle — lower left -->
    <g transform="translate(44,740)" opacity="0.7">
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#FFE033" stroke-width="2" stroke-linecap="round"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#FFE033" stroke-width="2" stroke-linecap="round"/>

  </svg>

  <!-- ==============================
       MAIN CONTENT
  =============================== -->
  <div class="content">

    <!-- TOP BRAND BAR -->
    <div class="brand-bar">
      <div class="logo-text">Ola<span>Brazil</span></div>
      <div class="tag-pill">PASCOA 2026</div>
    </div>

    <!-- CENTER STAGE -->
    <div class="center-stage">

      <!-- HEADLINE -->
      <div class="headline-wrap">
        <div class="headline-accent">-- Sabores do Brasil --</div>
        <div class="headline-main">
          Brasil tem<br/>
          <span class="highlight">o melhor</span>
          da Pascoa!
        </div>
      </div>

      <!-- EASTER EGGS SVG CLUSTER -->
      <div class="eggs-cluster">
        <svg width="840" height="380" viewBox="0 0 840 380" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- Egg 1 gradient — orange/pink -->
            <linearGradient id="egg1g" x1="20%" y1="0%" x2="80%" y2="100%">
              <stop offset="0%" stop-color="#ff9f43"/>
              <stop offset="50%" stop-color="#f47b20"/>
              <stop offset="100%" stop-color="#e85e2a"/>
            </linearGradient>
            <!-- Egg 2 gradient — green/teal -->
            <linearGradient id="egg2g" x1="20%" y1="0%" x2="80%" y2="100%">
              <stop offset="0%" stop-color="#4ecdc4"/>
              <stop offset="50%" stop-color="#1abc9c"/>
              <stop offset="100%" stop-color="#0d8a6e"/>
            </linearGradient>
            <!-- Egg 3 gradient — yellow/gold -->
            <linearGradient id="egg3g" x1="20%" y1="0%" x2="80%" y2="100%">
              <stop offset="0%" stop-color="#FFE033"/>
              <stop offset="50%" stop-color="#f7a800"/>
              <stop offset="100%" stop-color="#d4830a"/>
            </linearGradient>
            <!-- Egg 4 gradient — pink/fuchsia -->
            <linearGradient id="egg4g" x1="20%" y1="0%" x2="80%" y2="100%">
              <stop offset="0%" stop-color="#fd79a8"/>
              <stop offset="50%" stop-color="#d43f6b"/>
              <stop offset="100%" stop-color="#a0174a"/>
            </linearGradient>
            <!-- Egg 5 gradient — green -->
            <linearGradient id="egg5g" x1="20%" y1="0%" x2="80%" y2="100%">
              <stop offset="0%" stop-color="#55efc4"/>
              <stop offset="50%" stop-color="#2d9e52"/>
              <stop offset="100%" stop-color="#1a5e2a"/>
            </linearGradient>
            <!-- Clip paths for eggs -->
            <clipPath id="clip1">
              <ellipse cx="130" cy="210" rx="100" ry="128"/>
            </clipPath>
            <clipPath id="clip2">
              <ellipse cx="290" cy="198" rx="92" ry="118"/>
            </clipPath>
            <clipPath id="clip3">
              <ellipse cx="420" cy="192" rx="108" ry="140"/>
            </clipPath>
            <clipPath id="clip4">
              <ellipse cx="556" cy="198" rx="92" ry="118"/>
            </clipPath>
            <clipPath id="clip5">
              <ellipse cx="710" cy="210" rx="100" ry="128"/>
            </clipPath>

            <!-- Drop shadow filter -->
            <filter id="eggShadow" x="-20%" y="-10%" width="140%" height="130%">
              <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="rgba(0,0,0,0.38)"/>
            </filter>
            <filter id="eggShine" x="-5%" y="-5%" width="110%" height="110%">
              <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
              <feOffset dx="-4" dy="-6" result="offset"/>
              <feComposite in="SourceGraphic" in2="offset"/>
            </filter>
          </defs>

          <!-- ===== EGG 1 — ORANGE — LEFT BACK ===== -->
          <g filter="url(#eggShadow)" transform="rotate(-12,130,210)">
            <ellipse cx="130" cy="210" rx="100" ry="128" fill="url(#egg1g)"/>
            <!-- Floral pattern clipped to egg -->
            <g clip-path="url(#clip1)">
              <!-- Stripe band -->
              <rect x="30" y="178" width="200" height="28" fill="rgba(255,255,255,0.18)"/>
              <!-- Leaf motif -->
              <ellipse cx="88" cy="150" rx="12" ry="30" fill="#FFE033" opacity="0.7" transform="rotate(-25,88,150)"/>
