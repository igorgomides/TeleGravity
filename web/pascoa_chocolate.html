<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OlaBrazil — Páscoa Chocolate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #1a0800;
      font-family: 'Georgia', 'Times New Roman', serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .canvas {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 30%, #3d1c06 0%, #1f0d03 45%, #0d0400 100%);
    }

    /* ── Vignette overlay ── */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.70) 100%);
      pointer-events: none;
      z-index: 20;
    }

    /* ── Faint golden grid texture ── */
    .texture {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(200,150,30,0.04) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(200,150,30,0.04) 60px);
      pointer-events: none;
      z-index: 1;
    }

    /* ── Brand top bar ── */
    .brand-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #c8860a, #f5c842, #e07b00, #f5c842, #c8860a);
      z-index: 30;
    }

    /* ── Bottom bar ── */
    .brand-bar-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #c8860a, #f5c842, #e07b00, #f5c842, #c8860a);
      z-index: 30;
    }

    /* ── Main SVG container ── */
    .main-svg {
      position: absolute;
      top: 0; left: 0;
      width: 1080px;
      height: 1080px;
      z-index: 10;
    }

    /* ── Copy layer ── */
    .copy-block {
      position: absolute;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 25;
      width: 900px;
    }

    .tagline {
      font-family: 'Georgia', serif;
      font-size: 52px;
      font-weight: normal;
      font-style: italic;
      color: #f5c842;
      letter-spacing: 1px;
      line-height: 1.2;
      text-shadow:
        0 0 40px rgba(245,200,66,0.6),
        0 0 80px rgba(245,200,66,0.25),
        2px 2px 6px rgba(0,0,0,0.9);
    }

    .tagline strong {
      font-style: normal;
      font-weight: bold;
      color: #fff8e8;
    }

    .divider-line {
      width: 320px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #c8860a, #f5c842, #c8860a, transparent);
      margin: 20px auto;
    }

    .easter-greeting {
      font-family: 'Georgia', serif;
      font-size: 34px;
      font-style: normal;
      font-weight: bold;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow:
        0 0 30px rgba(255,255,255,0.3),
        2px 2px 8px rgba(0,0,0,0.9);
    }

    .brand-name {
      margin-top: 16px;
      font-family: 'Georgia', serif;
      font-size: 26px;
      letter-spacing: 10px;
      text-transform: uppercase;
      color: #f5c842;
      text-shadow: 0 0 20px rgba(245,200,66,0.5), 2px 2px 6px rgba(0,0,0,0.9);
    }

    /* ── Logo top-left ── */
    .logo-area {
      position: absolute;
      top: 44px;
      left: 56px;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-text {
      font-family: 'Georgia', serif;
      font-size: 36px;
      font-weight: bold;
      letter-spacing: 4px;
      color: #f5c842;
      text-shadow: 0 0 20px rgba(245,200,66,0.6), 2px 2px 6px rgba(0,0,0,0.9);
    }

    .logo-sub {
      font-family: 'Georgia', serif;
      font-size: 13px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(245,200,66,0.7);
      margin-top: 2px;
    }

    /* ── Easter badge top-right ── */
    .easter-badge {
      position: absolute;
      top: 40px;
      right: 56px;
      z-index: 30;
      text-align: right;
    }

    .badge-label {
      font-family: 'Georgia', serif;
      font-size: 14px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(245,200,66,0.75);
    }

    .badge-year {
      font-family: 'Georgia', serif;
      font-size: 40px;
      font-weight: bold;
      color: #f5c842;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(245,200,66,0.5);
    }
  </style>
</head>
<body>
  <div class="canvas">

    <!-- Bars -->
    <div class="brand-bar"></div>
    <div class="brand-bar-bottom"></div>
    <div class="texture"></div>
    <div class="vignette"></div>

    <!-- Logo -->
    <div class="logo-area">
      <div>
        <div class="logo-text">OlaBrazil</div>
        <div class="logo-sub">Sabores Tropicais</div>
      </div>
    </div>

    <!-- Easter badge -->
    <div class="easter-badge">
      <div class="badge-label">Coleção</div>
      <div class="badge-year">2026</div>
    </div>

    <!-- ═══════════════════════════════════════════
         MAIN SVG — Egg, ribbon, sparkles, petals
    ════════════════════════════════════════════ -->
    <svg class="main-svg" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
      <defs>

        <!-- ── Deep background glow ── -->
        <radialGradient id="bgGlow" cx="50%" cy="42%" r="45%">
          <stop offset="0%" stop-color="#5c2b00" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#0d0400" stop-opacity="0"/>
        </radialGradient>

        <!-- ── Egg outer gradient (rich chocolate) ── -->
        <radialGradient id="eggMain" cx="38%" cy="32%" r="68%">
          <stop offset="0%"   stop-color="#8b4200"/>
          <stop offset="18%"  stop-color="#6b2f00"/>
          <stop offset="42%"  stop-color="#4a1e00"/>
          <stop offset="72%"  stop-color="#2e1000"/>
          <stop offset="100%" stop-color="#1a0800"/>
        </radialGradient>

        <!-- ── Egg golden sheen ── -->
        <radialGradient id="eggSheen" cx="36%" cy="28%" r="40%">
          <stop offset="0%"   stop-color="#d4a240" stop-opacity="0.35"/>
          <stop offset="55%"  stop-color="#8b5e10" stop-opacity="0.10"/>
          <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
        </radialGradient>

        <!-- ── Egg specular highlight ── -->
        <radialGradient id="eggHighlight" cx="32%" cy="22%" r="28%">
          <stop offset="0%"   stop-color="#fff8e8" stop-opacity="0.55"/>
          <stop offset="40%"  stop-color="#f5c842" stop-opacity="0.20"/>
          <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
        </radialGradient>

        <!-- ── Egg secondary highlight (right-bottom) ── -->
        <radialGradient id="eggHighlight2" cx="72%" cy="76%" r="22%">
          <stop offset="0%"   stop-color="#c87820" stop-opacity="0.22"/>
          <stop offset="100%" stop-color="#c87820" stop-opacity="0"/>
        </radialGradient>

        <!-- ── Egg edge rim glow ── -->
        <radialGradient id="eggRim" cx="50%" cy="50%" r="50%">
          <stop offset="70%"  stop-color="#c87820" stop-opacity="0"/>
          <stop offset="88%"  stop-color="#d4943a" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="#f5c842" stop-opacity="0.45"/>
        </radialGradient>

        <!-- ── Drip gradient ── -->
        <linearGradient id="dripGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#7a3800"/>
          <stop offset="100%" stop-color="#3d1500" stop-opacity="0.5"/>
        </linearGradient>

        <!-- ── Ribbon main ── -->
        <linearGradient id="ribbonH" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#b8760a"/>
          <stop offset="22%"  stop-color="#f5c842"/>
          <stop offset="50%"  stop-color="#fde87a"/>
          <stop offset="78%"  stop-color="#f5c842"/>
          <stop offset="100%" stop-color="#b8760a"/>
        </linearGradient>

        <linearGradient id="ribbonV" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#b8760a"/>
          <stop offset="22%"  stop-color="#f5c842"/>
          <stop offset="50%"  stop-color="#fde87a"/>
          <stop offset="78%"  stop-color="#f5c842"/>
          <stop offset="100%" stop-color="#b8760a"/>
        </linearGradient>

        <!-- ── Knot gradient ── -->
        <radialGradient id="knotGrad" cx="45%" cy="40%" r="55%">
          <stop offset="0%"   stop-color="#fde87a"/>
          <stop offset="55%"  stop-color="#f5c842"/>
          <stop offset="100%" stop-color="#a86208"/>
        </radialGradient>

        <!-- ── Loop left gradient ── -->
        <linearGradient id="loopL" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#fde87a"/>
          <stop offset="50%"  stop-color="#d4943a"/>
          <stop offset="100%" stop-color="#8b5e10"/>
        </linearGradient>

        <!-- ── Loop right gradient ── -->
        <linearGradient id="loopR" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#fde87a"/>
          <stop offset="50%"  stop-color="#d4943a"/>
          <stop offset="100%" stop-color="#8b5e10"/>
        </linearGradient>

        <!-- ── Petal colors ── -->
        <radialGradient id="petalP" cx="50%" cy="30%" r="60%">
          <stop offset="0%"   stop-color="#f97ab8"/>
          <stop offset="100%" stop-color="#c2376b"/>
        </radialGradient>

        <radialGradient id="petalO" cx="50%" cy="30%" r="60%">
          <stop offset="0%"   stop-color="#ffb347"/>
          <stop offset="100%" stop-color="#e06000"/>
        </radialGradient>

        <radialGradient id="petalY" cx="50%" cy="30%" r="60%">
          <stop offset="0%"   stop-color="#fff07a"/>
          <stop offset="100%" stop-color="#c8a200"/>
        </radialGradient>

        <!-- ── Glow filter for sparkles ── -->
        <filter id="sparkleGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- ── Soft glow filter for egg ── -->
        <filter id="eggGlow" x="-12%" y="-12%" width="124%" height="124%">
          <feGaussianBlur stdDeviation="18" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- ── Drop shadow for egg ── -->
        <filter id="eggShadow" x="-20%" y="-15%" width="140%" height="140%">
          <feDropShadow dx="0" dy="30" stdDeviation="40" flood-color="#000" flood-opacity="0.7"/>
        </filter>

        <!-- ── Clip for egg shape ── -->
        <clipPath id="eggClip">
          <!-- egg ellipse: narrower top, wider bottom, tilted slightly -->
          <ellipse cx="540" cy="490" rx="210" ry="265"/>
        </clipPath>

      </defs>

      <!-- ════ Background warm glow ════ -->
      <ellipse cx="540" cy="450" rx="500" ry="420" fill="url(#bgGlow)"/>

      <!-- ════ Scattered petals — background layer ════ -->

      <!-- petal 1 — orange, top-left -->
      <g transform="translate(168,195) rotate(-35)">
        <ellipse rx="28" ry="14" fill="url(#petalO)" opacity="0.7"/>
      </g>
      <!-- petal 2 — pink, top-left -->
      <g transform="translate(210,260) rotate(20)">
        <ellipse rx="22" ry="10" fill="url(#petalP)" opacity="0.65"/>
      </g>
      <!-- petal 3 — yellow, top-center -->
      <g transform="translate(385,145) rotate(-10)">
        <ellipse rx="26" ry="11" fill="url(#petalY)" opacity="0.6"/>
      </g>
      <!-- petal 4 — orange, top-right -->
      <g transform="translate(720,170) rotate(40)">
        <ellipse rx="30" ry="13" fill="url(#petalO)" opacity="0.65"/>
      </g>
      <!-- petal 5 — pink, right -->
      <g transform="translate(870,310) rotate(-20)">
        <ellipse rx="24" ry="11" fill="url(#petalP)" opacity="0.6"/>
      </g>
      <!-- petal 6 — yellow, right -->
      <g transform="translate(855,430) rotate(55)">
        <ellipse rx="20" ry="9" fill="url(#petalY)" opacity="0.55"/>
      </g>
      <!-- petal 7 — orange, left -->
      <g transform="translate(148,390) rotate(30)">
        <ellipse rx="26" ry="12" fill="url(#petalO)" opacity="0.6"/>
      </g>
      <!-- petal 8 — pink, bottom-left -->
      <g transform="translate(192,650) rotate(-50)">
        <ellipse rx="28" ry="12" fill="url(#petalP)" opacity="0.55"/>
      </g>
      <!-- petal 9 — yellow, bottom-right -->
      <g transform="translate(850,660) rotate(25)">
        <ellipse rx="25" ry="11" fill="url(#petalY)" opacity="0.55"/>
      </g>
      <!-- petal 10 — orange, bottom-center -->
      <g transform="translate(650,760) rotate(-15)">
        <ellipse rx="22" ry="10" fill="url(#petalO)" opacity="0.5"/>
      </g>
      <!-- petal 11 -->
      <g transform="translate(430,760) rotate(60)">
        <ellipse rx="20" ry="9" fill="url(#petalP)" opacity="0.5"/>
      </g>
      <!-- petal 12 -->
      <g transform="translate(310,690) rotate(-40)">
        <ellipse rx="18" ry="8" fill="url(#petalY)" opacity="0.45"/>
      </g>
      <!-- small petals scattered -->
      <g transform="translate(480,125) rotate(15)"><ellipse rx="15" ry="7" fill="url(#petalP)" opacity="0.5"/></g>
      <g transform="translate(600,140) rotate(-30)"><ellipse rx="13" ry="6" fill="url(#petalO)" opacity="0.45"/></g>
      <g transform="translate(135,520) rotate(45)"><ellipse rx="16" ry="7" fill="url(#petalY)" opacity="0.45"/></g>
      <g transform="translate(935,500) rotate(-60)"><ellipse rx="17" ry="7" fill="url(#petalP)" opacity="0.45"/></g>
      <g transform="translate(920,200) rotate(10)"><ellipse rx="14" ry="6" fill="url(#petalY)" opacity="0.4"/></g>
      <g transform="translate(280,130) rotate(-55)"><ellipse rx="16" ry="7" fill="url(#petalO)" opacity="0.4"/></g>

      <!-- ════ Decorative arcs (light orbits around egg) ════ -->
      <g opacity="0.18">
        <ellipse cx="540" cy="490" rx="255" ry="310" fill="none" stroke="#f5c842" stroke-width="1"/>
        <ellipse cx="540" cy="490" rx="278" ry="335" fill="none" stroke="#f5c842" stroke-width="0.5" stroke-dasharray="8 14"/>
        <ellipse cx="540" cy="490" rx="308" ry="365" fill="none" stroke="#d4943a" stroke-width="0.5" stroke-dasharray="4 20"/>
      </g>

      <!-- ════ EGG — shadow base ════ -->
      <ellipse cx="540" cy="730" rx="185" ry="28"
        fill="#000" opacity="0.45"
        filter="url(#eggShadow)"/>

      <!-- ════ EGG — chocolate body ════ -->
      <g filter="url(#eggGlow)">
        <ellipse cx="540" cy="490" rx="210" ry="265"
          fill="url(#eggMain)"/>
      </g>
      <!-- Rim glow -->
      <ellipse cx="540" cy="490" rx="210" ry="265"
        fill="url(#eggRim)"/>
      <!-- Golden sheen -->
      <ellipse cx="540" cy="490" rx="210" ry="265"
        fill="url(#eggSheen)"/>
      <!-- Primary specular highlight -->
      <ellipse cx="540" cy="490" rx="210" ry="265"
        fill="url(#eggHighlight)"/>
      <!-- Secondary warm glow -->
      <ellipse cx="540" cy="490" rx="210" ry="265"
        fill="url(#eggHighlight2)"/>

      <!-- ════ Chocolate texture — subtle horizontal bands ════ -->
      <g clip-path="url(#eggClip)" opacity="0.09">
        <rect x="330" y="350" width="420" height="3" rx="1.5" fill="#f5c842"/>
        <rect x="330" y="380" width="420" height="2" rx="1" fill="#f5c842"/>
        <rect x="330" y="408" width="420" height="3" rx="1.5" fill="#f5c842"/>
        <rect x="330" y="435" width="420" height="2" rx="1" fill="#f5c842"/>
        <rect x="330" y="460" width="420" height="3" rx="1.5" fill="#f5c842"/>
        <rect x="330" y="484" width="420" height="2" rx="1" fill="#f5c842"/>
        <rect x="330" y="507" width="420" height="3" rx="1.5" fill="#f5c842"/>
        <rect x="330" y="529" width="420" height="2" rx="1" fill="#f5c842"/>
        <rect x="330" y="550" width="420" height="3" rx="1.5" fill="#f5c842"/>
        <rect x="330" y="570" width="420" height="2" rx="1" fill="#f5c842"/>
        <rect x="330" y="590" width="420" height="3" rx="1.5" fill="#f5c842"/>
        <rect x="330" y="610" width="420" height="2" rx="1" fill="#f5c842"/>
        <rect x="330" y="628" width="420" height="3" rx="1.5" fill="#f5c842"/>
        <rect x="330" y="646" width="420" height="2" rx="1" fill="#f5c842"/>
        <rect x="330" y="663" width="420" height="3" rx="1.5" fill="#f5c842"/>
        <rect x="330" y="679" width="420" height="2" rx="1" fill="#f5c842"/>
        <rect x="330" y="695" width="420" height="3" rx="1.5" fill="#f5c842"/>
      </g>

      <!-- ════ Chocolate drips ════ -->
      <g clip-path="url(#eggClip)">
        <!-- drip 1 -->
        <path d="M480,228 Q478,252 482,272 Q484,290 480,305 Q476,322 480,338" stroke="url(#dripGrad)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.45"/>
        <!-- drip 2 -->
        <path d="M520,224 Q518,244 524,262 Q528,280 522,295" stroke="url(#dripGrad)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.35"/>
        <!-- drip 3 -->
        <path d="M560,226 Q562,250 558,268 Q554,285 560,302 Q564,318 558,332" stroke="url(#dripGrad)" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.40"/>
        <!-- drip 4 -->
        <path d="M598,232 Q600,254 596,272 Q592,290 598,306" stroke="url(#dripGrad)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.30"/>
      </g>

      <!-- ════ Egg outline/stroke ════ -->
      <ellipse cx="540" cy="490" rx="210" ry="265"
        fill="none"
        stroke="url(#ribbonH)"
        stroke-width="2"
        opacity="0.5"/>

      <!-- ════ RIBBON — horizontal band ════ -->
      <g>
        <!-- band shadow -->
        <rect x="326" y="460" width="428" height="64" rx="4"
          fill="#000" opacity="0.35"
          clip-path="url(#eggClip)"/>
        <!-- band main -->
        <rect x="326" y="458" width="428" height="60" rx="4"
          fill="url(#ribbonH)"
          clip-path="url(#eggClip)"
          opacity="0.92"/>
        <!-- band inner highlight -->
        <rect x="326" y="458" width="428" height="18" rx="4"
          fill="rgba(255,248,220,0.22)"
          clip-path="url(#eggClip)"/>
        <!-- band lower shadow -->
        <rect x="326" y="502" width="428" height="16" rx="4"
          fill="rgba(0,0,0,0.18)"
          clip-path="url(#eggClip)"/>
      </g>

      <!-- ════ RIBBON — vertical band ════ -->
      <g>
        <!-- band shadow -->
        <rect x="510" y="226" width="64" height="528" rx="4"
          fill="#000" opacity="0.25"
          clip-path="url(#eggClip)"/>
        <!-- band main -->
        <rect x="512" y="226" width="60" height="528" rx="4"
          fill="url(#ribbonV)"
          clip-path="url(#eggClip)"
          opacity="0.88"/>
        <!-- band inner highlight -->
        <rect x="512" y="226" width="18" height="528" rx="4"
          fill="rgba(255,248,220,0.22)"
          clip-path="url(#eggClip)"/>
      </g>

      <!-- ════ BOW — loops above egg ════ -->
      <g transform="translate(540,228)" filter="url(#eggGlow)">
        <!-- Left loop -->
        <path d="M0,0 C-15,-30 -70,-65 -100,-55 C-130,-44 -125,-10 -110,5 C-95,20 -50,22 -20,10 Z"
          fill="url(#loopL)" opacity="0.95"/>
        <!-- Left loop shadow inside -->
        <path d="M0,0 C-15,-30 -70,-65 -100,-55 C-120,-46 -122,-20 -108,0 C-90,22 -48,22 -18,10 Z"
          fill="rgba(0,0,0,0.18)"/>
        <!-- Left loop highlight -->
        <path d="M-6,-5 C-20,-28 -60,-58 -88,-52 C-110,-45 -112,-28 -104,-14"
          stroke="rgba(255,248,200,0.4)" stroke-width="3" fill="none" stroke-linecap="round"/>

        <!-- Right loop -->
        <path d="M0,0 C15,-30 70,-65 100,-55 C130,-44 125,-10 110,5 C95,20 50,22 20,10 Z"
          fill="url(#loopR)" opacity="0.95"/>
        <!-- Right loop shadow inside -->
        <path d="M0,0 C15,-30 70,-65 100,-55 C120,-46 122,-20 108,0 C90,22 48,22 18,10 Z"
          fill="rgba(0,0,0,0.18)"/>
        <!-- Right loop highlight -->
        <path d="M6,-5 C20,-28 60,-58 88,-52 C110,-45 112,-28 104,-14"
          stroke="rgba(255,248,200,0.4)" stroke-width="3" fill="none" stroke-linecap="round"/>

        <!-- Left tail -->
        <path d="M-10,6 C-30,18 -55,40 -60,70 C-55,60 -35,38 -14,24 Z"
          fill="url(#loopL)" opacity="0.9"/>
        <!-- Right tail -->
        <path d="M10,6 C30,18 55,40 60,70 C55,60 35,38 14,24 Z"
          fill="url(#loopR)" opacity="0.9"/>

        <!-- Knot center -->
        <ellipse cx="0" cy="0" rx="22" ry="18" fill="url(#knotGrad)"/>
        <ellipse cx="-5" cy="-5" rx="8" ry="6" fill="rgba(255,248,220,0.38)"/>
        <ellipse cx="0" cy="0" rx="22" ry="18" fill="none" stroke="#c8860a" stroke-width="1.5" opacity="0.5"/>
      </g>

      <!-- ════ SPARKLES / STARS ════ -->
      <g filter="url(#sparkleGlow)">

        <!-- Large star — top-left -->
        <g transform="translate(175,155)">
