<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OlaBrazil — Páscoa Família</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #fff8ee;
    }

    .canvas {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 0%, #fff4d6 0%, #fff8ee 45%, #fdf0e0 100%);
    }

    /* Sun glow top center */
    .sun-glow {
      position: absolute;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,220,80,0.55) 0%, rgba(255,180,40,0.18) 55%, transparent 75%);
      pointer-events: none;
    }

    /* Soft light rays */
    .rays {
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      pointer-events: none;
      opacity: 0.22;
    }

    /* Grass strip at bottom */
    .grass-strip {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 1080px;
      height: 200px;
      pointer-events: none;
    }

    /* Content wrapper */
    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 1080px;
      height: 1080px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 54px 60px 0 60px;
    }

    /* Logo area */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .logo-text {
      font-size: 36px;
      font-weight: 900;
      font-family: 'Georgia', serif;
      letter-spacing: 2px;
      color: #e8560a;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(232,86,10,0.15);
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f5c518;
      display: inline-block;
      margin-left: 2px;
      vertical-align: middle;
    }

    /* Tag line */
    .tagline {
      font-size: 15px;
      letter-spacing: 4px;
      color: #b86b2a;
      text-transform: uppercase;
      font-family: 'Georgia', serif;
      margin-bottom: 26px;
      opacity: 0.85;
    }

    /* Divider flourish */
    .divider {
      margin-bottom: 24px;
    }

    /* Main illustration zone */
    .illustration {
      width: 680px;
      height: 360px;
      margin-bottom: 22px;
      position: relative;
    }

    /* Headline copy */
    .headline {
      font-size: 52px;
      font-weight: 900;
      font-family: 'Georgia', serif;
      color: #c84d09;
      text-align: center;
      line-height: 1.18;
      letter-spacing: -0.5px;
      text-shadow: 0 3px 18px rgba(200,77,9,0.13);
      margin-bottom: 18px;
      max-width: 860px;
    }

    .headline em {
      font-style: italic;
      color: #e8a020;
    }

    /* Sub copy */
    .sub-copy {
      font-size: 22px;
      color: #7a4c1d;
      font-family: 'Georgia', serif;
      text-align: center;
      line-height: 1.5;
      max-width: 760px;
      font-style: italic;
      opacity: 0.9;
      margin-bottom: 32px;
    }

    /* Bottom accent band */
    .bottom-band {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 1080px;
      height: 52px;
      background: linear-gradient(90deg, #e8560a 0%, #f5a623 35%, #7cbf3e 65%, #e8560a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bottom-band-text {
      font-size: 15px;
      letter-spacing: 5px;
      color: #fff;
      text-transform: uppercase;
      font-family: 'Georgia', serif;
      font-weight: bold;
      text-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }

    /* Corner decorations */
    .corner-tl {
      position: absolute;
      top: 22px;
      left: 22px;
    }

    .corner-tr {
      position: absolute;
      top: 22px;
      right: 22px;
    }

    /* Floating eggs decoration */
    .egg-float {
      position: absolute;
    }
  </style>
</head>
